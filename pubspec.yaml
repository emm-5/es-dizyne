name: es_dizyne
description: ES Dizyne - Professional Mobile Graphic Design Suite
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Canvas & Drawing
  perfect_freehand: ^2.0.1
  flutter_svg: ^2.0.9

  # Image Processing
  image: ^4.1.3
  flutter_image_compress: ^2.1.0

  # File Management
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  permission_handler: ^11.3.0
  share_plus: ^7.2.1
  archive: ^3.4.10

  # Storage
  sqflite: ^2.3.2
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ML / AI (offline)
  tflite_flutter: ^0.10.4

  # UI Components
  flutter_colorpicker: ^1.0.3
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Gestures & Input
  vector_math: ^2.1.4

  # Color
  hsluv: ^0.1.0
  colorfilter_generator: ^1.0.3

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Fonts & Text
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5
  get_it: ^7.6.7
  provider: ^6.1.2
  rxdart: ^0.27.7

  # Compression
  pointycastle: ^3.7.4
  crypto: ^3.0.3

  # Icons
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/brushes/
    - assets/fonts/
    - assets/shapes/
    - assets/patterns/
    - assets/icons/
    - assets/ml_models/
    - assets/color_palettes/

  fonts:
    - family: ESDizyne
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-Light.ttf
          weight: 300
