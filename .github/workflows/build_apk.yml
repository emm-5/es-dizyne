name: Build ES Dizyne APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Flutter ───────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # ── Cache ─────────────────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Flutter Setup ─────────────────────────────────
      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── Build APK ─────────────────────────────────────
      - name: Build Debug APK
        run: flutter build apk --debug --split-per-abi

      - name: Build Release APK
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info

      - name: Build Universal APK
        run: flutter build apk --release

      # ── Get version info ──────────────────────────────
      - name: Get version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # ── Rename APKs ───────────────────────────────────
      - name: Rename APKs
        run: |
          mkdir -p build/outputs
          cp build/app/outputs/flutter-apk/app-release.apk \
             "build/outputs/ESDizyne-v${{ steps.version.outputs.version }}-release.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             "build/outputs/ESDizyne-v${{ steps.version.outputs.version }}-arm64.apk" || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             "build/outputs/ESDizyne-v${{ steps.version.outputs.version }}-arm32.apk" || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
             "build/outputs/ESDizyne-v${{ steps.version.outputs.version }}-x86_64.apk" || true

      # ── Upload APKs ───────────────────────────────────
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: ESDizyne-Universal-APK
          path: "build/outputs/ESDizyne-v${{ steps.version.outputs.version }}-release.apk"
          retention-days: 30

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: ESDizyne-ARM64-APK
          path: "build/outputs/ESDizyne-v${{ steps.version.outputs.version }}-arm64.apk"
          retention-days: 30
        continue-on-error: true

      - name: Upload ARM32 APK
        uses: actions/upload-artifact@v4
        with:
          name: ESDizyne-ARM32-APK
          path: "build/outputs/ESDizyne-v${{ steps.version.outputs.version }}-arm32.apk"
          retention-days: 30
        continue-on-error: true

      # ── Create Release ────────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}
          name: ES Dizyne v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            build/outputs/*.apk
          body: |
            ## ES Dizyne v${{ steps.version.outputs.version }}
            
            ### 📱 Download Options
            - **Universal APK** — Works on all Android devices (recommended)
            - **ARM64 APK** — For modern 64-bit Android phones (smaller size)
            - **ARM32 APK** — For older 32-bit devices
            
            ### ✅ Requirements
            - Android 8.0 (API 26) or higher
            
            ### 📦 Features
            - Full graphic design suite
            - Photoshop-grade brush engine
            - PSD, Affinity, PLP file support
            - RGB & CMYK color modes
            - Background remover (AI, offline)
            - Custom color palettes
            - Artboards system
            - Full export options (PNG, JPG, TIFF, SVG, PDF, EPS, WebP...)
            
            Built on: ${{ steps.version.outputs.date }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
